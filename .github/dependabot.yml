version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - go
    assignees:
      - justanotherspy
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    assignees:
      - justanotherspy
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    assignees:
      - justanotherspy
    groups:
      docker:
        patterns:
          - "*"

  # Hash-pinned pip requirements used by the zizmor / semgrep workflows
  # (.github/requirements/*.txt).
  - package-ecosystem: pip
    directory: /.github
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    assignees:
      - justanotherspy
    groups:
      pip:
        patterns:
          - "*"

  # Lockfile-pinned Claude Code CLI used by the plugin-validate CI job.
  - package-ecosystem: npm
    directory: /.github/plugin-validate
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    assignees:
      - justanotherspy
    groups:
      npm:
        patterns:
          - "*"
