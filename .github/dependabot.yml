version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - go
    assignees:
      - justanotherspy
    groups:
      go-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    assignees:
      - justanotherspy
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    assignees:
      - justanotherspy
    groups:
      docker:
        patterns:
          - "*"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
  # Hash-pinned pip requirements used by the zizmor / semgrep workflows
  # (.github/requirements/*.txt).
  - package-ecosystem: pip
    directory: /.github
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    assignees:
      - justanotherspy
    groups:
      pip:
        patterns:
          - "*"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
  # Channel shim plugin (bun.lock-pinned, exact versions).
  - package-ecosystem: bun
    directory: /plugins/shuck-channel
    schedule:
      interval: weekly
    labels:
      - dependencies
      - plugin
    assignees:
      - justanotherspy
    groups:
      bun:
        patterns:
          - "*"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
  # Lockfile-pinned Claude Code CLI used by the plugin-validate CI job.
  - package-ecosystem: npm
    directory: /.github/plugin-validate
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    assignees:
      - justanotherspy
    groups:
      npm:
        patterns:
          - "*"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
