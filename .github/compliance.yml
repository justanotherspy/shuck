# .github/compliance.yml — the definitive, intended settings for this repository.
#
# `shuck compliance` reads the repo's live GitHub settings and checks them
# against this file, so CI can fail when a setting drifts from policy. This file
# is a full snapshot (generated by `shuck compliance discover`): it declares
# every setting shuck can read — repository, security, GitHub Actions policies,
# and the default branch's protection. A setting the token cannot read is
# reported as skipped, never a silent pass.
#
# One key is deliberately absent: `enforce_admins`. main is protected by
# rulesets, and a ruleset's bypass actors are not visible via the rules API, so
# its value cannot be declared or checked.
#
# See `shuck compliance --help` or the README's "Settings compliance" section.

repository:
  visibility: public
  default_branch: main
  allow_merge_commit: false
  allow_squash_merge: true
  allow_rebase_merge: false
  allow_auto_merge: true
  allow_update_branch: true
  delete_branch_on_merge: true
  squash_merge_commit_title: COMMIT_OR_PR_TITLE
  squash_merge_commit_message: COMMIT_MESSAGES
  merge_commit_title: MERGE_MESSAGE
  merge_commit_message: PR_TITLE
  has_issues: true
  has_wiki: false
  has_projects: false
  has_discussions: false
  is_template: false
  allow_forking: true
  web_commit_signoff_required: true
  archived: false
security:
  secret_scanning: true
  secret_scanning_push_protection: true
  dependabot_security_updates: true
  vulnerability_alerts: true
actions:
  enabled: true
  allowed_actions: all
  sha_pinning_required: false
  default_workflow_permissions: read
  can_approve_pull_request_reviews: false
  fork_pr_contributor_approval: all_external_contributors
branch_protection:
  main:
    required_approving_review_count: 0
    dismiss_stale_reviews: false
    require_code_owner_reviews: false
    require_last_push_approval: false
    required_status_checks:
      - Actionlint
      - Actions audit
      - Analyze (actions)
      - Analyze (go)
      - Build & publish
      - Govulncheck
      - Lint
      - Plugin validate
      - ShellCheck
      - Test
      - Tidy check
      - TruffleHog
      - semgrep
      - zizmor
    strict_status_checks: false
    required_linear_history: false
    allow_force_pushes: false
    allow_deletions: false
    required_conversation_resolution: false
    required_signatures: true
