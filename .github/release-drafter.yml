name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    when:
      labels:
        - "feature"
        - "enhancement"
  - title: "Bug Fixes"
    when:
      labels:
        - "fix"
        - "bug"
  - title: "Maintenance"
    when:
      labels:
        - "chore"
        - "refactor"
        - "dependencies"
  - title: "Documentation"
    when:
      labels:
        - "docs"
        - "documentation"

  # Version resolution (migrated from the deprecated `version-resolver` block).
  - type: "version-resolver"
    semver-increment: "major"
    when:
      labels:
        - "major"
  - type: "version-resolver"
    semver-increment: "minor"
    when:
      labels:
        - "minor"
        - "feature"
        - "enhancement"
  - type: "version-resolver"
    semver-increment: "patch"
    when:
      labels:
        - "patch"
        - "fix"
        - "bug"
        - "chore"
        - "refactor"
        - "dependencies"
        - "docs"
        - "documentation"
  # No `when` condition ⇒ the default increment (was `version-resolver.default`).
  - type: "version-resolver"
    semver-increment: "patch"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

template: |
  ## Changes

  $CHANGES
