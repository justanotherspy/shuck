name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "Maintenance"
    labels:
      - "chore"
      - "refactor"
      - "dependencies"
  - title: "Documentation"
    labels:
      - "docs"
      - "documentation"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bug"
      - "chore"
      - "refactor"
      - "dependencies"
      - "docs"
      - "documentation"
  default: patch

autolabeler:
  - label: "documentation"
    files:
      - "*.md"
  - label: "feature"
    branch:
      - '/^feat(ure)?\/.+/'
  - label: "fix"
    branch:
      - '/^(fix|bug(fix)?)\/.+/'
  - label: "chore"
    branch:
      - '/^chore\/.+/'

template: |
  ## Changes

  $CHANGES
