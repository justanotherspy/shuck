name: GHCR Cleanup

# Prune old container images from GHCR. docker.yml pushes a new `sha-<short>`
# tag (plus its signature/attestation referrers and untagged multi-arch
# children) on every push to main — for the CLI image and the four backend
# images (JUS-93) — so each package grows without bound.
#
# Retention policy (identical for every package):
#   - `edge`, `latest`, and the semver release tags are never touched
#     (only `sha-*` tags are deletion candidates).
#   - The 2 most recent `sha-*` builds are kept for rollback headroom.
#   - Everything else goes: older `sha-*` images, their cosign signature /
#     provenance referrers, and orphaned untagged images. The action walks
#     multi-arch indices and referrers, so deleting an image also deletes
#     its platform children and attached artifacts.
#
# The `charts/shuck` Helm OCI package is deliberately not listed: it only
# receives semver tags (one per release), which this policy never deletes.
on:
  schedule:
    - cron: "45 4 * * 1" # weekly, Monday 04:45 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Log what would be deleted without deleting anything"
        type: boolean
        default: false

permissions:
  contents: read

# The cleanup action is not safe to run concurrently against the same
# package; the matrix legs each target a distinct package, so they may run
# in parallel, but two workflow runs must not overlap.
concurrency:
  group: ghcr-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Prune old images (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - shuck
          - shuck-ingest
          - shuck-worker
          - shuck-gateway
          - shuck-portal
    permissions:
      packages: write # delete GHCR package versions
    steps:
      - name: Delete old sha-* images and untagged versions
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1.2.2
        with:
          packages: ${{ matrix.package }}
          # Only sha-* build tags are candidates; release tags never match.
          # exclude-tags is a second safety net on top of that.
          delete-tags: sha-*
          keep-n-tagged: 2
          exclude-tags: edge,latest
          # Orphaned untagged images and stranded sha256-* referrers whose
          # parent image is already gone.
          delete-untagged: true
          delete-orphaned-images: true
          # Post-run check that every multi-arch index still has all its
          # platform children (informational).
          validate: true
          dry-run: ${{ inputs.dry-run == true }}
