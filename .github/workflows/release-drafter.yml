name: Release Drafter

# Draft only after CI has passed on main, so the release draft never gets
# ahead of a broken main. workflow_run is safe here: this workflow never
# checks out or executes code from the triggering run, it only calls the
# release-drafter action against the repo metadata.
on:
  workflow_run: # zizmor: ignore[dangerous-triggers] no checkout/execution of triggering-run code; read-only consumer of the CI conclusion
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  update_release_draft:
    # Gate on the CI run's outcome: only a successful `push` run on main
    # updates the draft. (The event guard keeps fork PRs from a branch that
    # happens to be named `main` from sneaking past the branch filter.)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
