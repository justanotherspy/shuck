name: Semgrep

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: Scan (Semgrep CE)
        run: semgrep scan --config p/golang --config p/security-audit --config p/secrets --error --verbose
