name: Semgrep

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
      # Hash-pinned install (supply-chain integrity); the requirements file is
      # regenerated by Dependabot's pip ecosystem.
      - name: Install Semgrep CE
        run: python -m pip install --require-hashes -r .github/requirements/semgrep.txt
      - name: Scan (Semgrep CE)
        run: semgrep scan --config p/golang --config p/security-audit --config p/secrets --error --verbose
