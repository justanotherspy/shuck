name: Scorecard

# OpenSSF Scorecard: scores the repo's security posture (branch protection,
# pinned dependencies, token permissions, etc.) and uploads the findings to the
# Security tab. Results are also published to the public OpenSSF API so the
# README badge can render.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  branch_protection_rule:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF results to code scanning
      id-token: write # publish results to the OpenSSF API (badge)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@2d1146689b8cda280b9bc96326124645441f03bc # v2.4.4
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
