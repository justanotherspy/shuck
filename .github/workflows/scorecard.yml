name: Scorecard

# OpenSSF Scorecard: scores the repo's security posture (branch protection,
# pinned dependencies, token permissions, etc.) and uploads the findings to the
# Security tab. Results are also published to the public OpenSSF API so the
# README badge can render.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC
  branch_protection_rule:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF results to code scanning
      id-token: write # publish results to the OpenSSF API (badge)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
