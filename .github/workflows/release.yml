name: Release

on:
  push:
    tags:
      - "v*"

# Default to read-only; the goreleaser job declares the write scopes it needs
# (job-level permissions replace, not extend, the workflow-level ones).
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      # Keyless cosign signing of checksums.txt uses the workflow OIDC token.
      id-token: write
      # SLSA build-provenance attestation for the released artifacts.
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          # Release builds must not trust a shared cache (cache poisoning).
          cache: false
      # cosign signs checksums.txt; syft generates the per-archive SBOMs.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on justanotherspy/homebrew-tap so goreleaser
          # can push the generated cask there. The default GITHUB_TOKEN only
          # reaches this repo, so a separate token is required for the tap.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # Generate SLSA build provenance covering every released artifact (one
      # attestation keyed off checksums.txt). Verify with:
      #   gh attestation verify <archive> --repo justanotherspy/shuck
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt

      # The release is published/created as a prerelease so its "Latest" badge
      # (and the Homebrew cask) never point at a release before its binaries and
      # cask are attached. goreleaser has finished uploading by this step, so
      # promote the release: clear the prerelease flag and mark it latest.
      - name: Promote release to latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --prerelease=false \
            --latest

  # Build & push the release container image to GHCR (the semver tags and
  # :latest). This calls docker.yml rather than relying on a `release:` trigger
  # there: GoReleaser creates the release with the workflow's GITHUB_TOKEN, and
  # token-created events never trigger other workflows. `needs: goreleaser`
  # keeps the image publish behind the same "release" environment approval that
  # gates goreleaser.
  docker:
    needs: goreleaser
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless signing + provenance OIDC
      attestations: write # actions/attest-build-provenance
    uses: ./.github/workflows/docker.yml

  # Package and push the Helm chart as an OCI artifact
  # (oci://ghcr.io/<owner>/charts/shuck), versioned from the tag so the
  # chart's appVersion pins the release's backend images. `needs:
  # goreleaser` keeps it behind the same "release" environment approval.
  helm:
    name: Publish Helm chart
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Log in to GHCR
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: helm registry login ghcr.io --username "$GHCR_USER" --password-stdin <<< "$GHCR_TOKEN"
      - name: Package and push
        id: push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          helm package deploy/helm/shuck \
            --version "$version" --app-version "$version" \
            --destination dist-chart
          out=$(helm push "dist-chart/shuck-${version}.tgz" \
            "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts" 2>&1)
          echo "$out"
          digest=$(echo "$out" | awk '/Digest:/ {print $2}')
          if [ -z "$digest" ]; then
            echo "::error::could not parse the pushed chart digest"
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Sign the published chart (keyless)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts/shuck@${DIGEST}"
