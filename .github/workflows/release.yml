name: Release

on:
  push:
    tags:
      - "v*"

# Default to read-only; the goreleaser job declares the write scopes it needs
# (job-level permissions replace, not extend, the workflow-level ones).
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      # Keyless cosign signing of checksums.txt uses the workflow OIDC token.
      id-token: write
      # SLSA build-provenance attestation for the released artifacts.
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # Release builds must not trust a shared cache (cache poisoning).
          cache: false
      # cosign signs checksums.txt; syft generates the per-archive SBOMs.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with contents:write on justanotherspy/homebrew-tap so goreleaser
          # can push the generated cask there. The default GITHUB_TOKEN only
          # reaches this repo, so a separate token is required for the tap.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # Generate SLSA build provenance covering every released artifact (one
      # attestation keyed off checksums.txt). Verify with:
      #   gh attestation verify <archive> --repo justanotherspy/shuck
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

      # The release is published/created as a prerelease so its "Latest" badge
      # (and the Homebrew cask) never point at a release before its binaries and
      # cask are attached. goreleaser has finished uploading by this step, so
      # promote the release: clear the prerelease flag and mark it latest.
      - name: Promote release to latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --prerelease=false \
            --latest

  # Build & push the release container image to GHCR (the semver tags and
  # :latest). This calls docker.yml rather than relying on a `release:` trigger
  # there: GoReleaser creates the release with the workflow's GITHUB_TOKEN, and
  # token-created events never trigger other workflows. `needs: goreleaser`
  # keeps the image publish behind the same "release" environment approval that
  # gates goreleaser.
  docker:
    needs: goreleaser
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless signing + provenance OIDC
      attestations: write # actions/attest-build-provenance
    uses: ./.github/workflows/docker.yml

  # Tell justanotherspy.com a release went live so it rebuilds and its shuck
  # project page picks up the new version (the site fetches the latest release
  # tag at build time, excluding pre-releases — hence after goreleaser, which
  # ends by promoting the release out of pre-release).
  notify-website:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send repository_dispatch to justanotherspy.com
        env:
          # Fine-grained PAT with contents:write on
          # justanotherspy/justanotherspy.com (repository_dispatch needs a
          # cross-repo token; GITHUB_TOKEN only reaches this repo).
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::WEBSITE_DISPATCH_TOKEN not set; skipping website rebuild trigger."
            exit 0
          fi
          gh api repos/justanotherspy/justanotherspy.com/dispatches \
            -f event_type=release-published
