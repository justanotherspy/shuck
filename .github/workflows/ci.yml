name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # pull-requests: write lets the coverage step post/update a PR comment.
    # The token is read-only on fork PRs, so that step is guarded to same-repo
    # PRs below; coverage still lands in the job summary either way.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Portable binary stays lean (no backend deps)
        # The compatibility contract (docs/V2.md): the root shuck binary
        # must never link the self-hosted backend — no AWS SDK, no
        # WebSocket library, no ingest/gateway/worker/portal packages.
        run: |
          leaks=$(go list -deps . | grep -E 'aws-sdk-go|aws-lambda-go|coder/websocket|justanotherspy/shuck/internal/(ingest|gateway|worker|portal)' || true)
          if [ -n "$leaks" ]; then
            echo "portable shuck binary links backend packages:" >&2
            echo "$leaks" >&2
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Modernize (go fix)
        run: make modernize-check
      - name: Test
        run: make test
      - name: Coverage report (job summary)
        run: make cover-report | tee coverage-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment coverage on PR
        # Skip on fork PRs (read-only token) and on pushes to main.
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-report -->';
            const body = `${marker}\n${fs.readFileSync('coverage-report.md', 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            // Reuse the existing sticky comment (found by its hidden marker) so
            // each push updates one comment instead of stacking new ones.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.info(`Updated coverage comment on PR #${issue_number}`);
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
              core.info(`Created coverage comment on PR #${issue_number}`);
            }
      # Gate after the report/comment steps so the coverage numbers still land
      # on the PR even when the gate fails.
      - name: Coverage gate (>= 80%)
        run: make cover-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  vuln:
    name: Govulncheck
    runs-on: ubuntu-latest
    env:
      # Let go.mod's `toolchain` directive pull the patched Go for the scan,
      # so CI matches `make vuln` locally instead of a runner's base toolchain.
      GOTOOLCHAIN: auto
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: make vuln

  tidy:
    name: Tidy check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Verify go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      # Run actionlint directly (it shells out to the runner's shellcheck for
      # `run:` blocks) instead of via reviewdog, so the job needs no write
      # permissions on the GITHUB_TOKEN. The exact-version `go install` is
      # checksum-verified by the Go module sumdb.
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
      - name: Lint workflows (actionlint + shellcheck)
        run: actionlint -color

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: ShellCheck
        run: find . -type f -name '*.sh' -print0 | xargs -0 -r shellcheck

  plugin-validate:
    name: Plugin validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
      # `npm ci` installs from the committed lockfile (integrity-hash pinned;
      # kept current by the npm Dependabot ecosystem).
      #
      # The claude native binary ships in a platform-specific optionalDependency
      # (@anthropic-ai/claude-code-linux-x64), and npm swallows optional-dep
      # install failures silently — `npm ci` can exit 0 with the binary missing.
      # Verify it actually runs; if not, retry once from a clean slate and fail
      # loudly with the real install error instead of the wrapper's hint.
      - name: Install Claude Code CLI
        working-directory: .github/plugin-validate
        run: |
          for attempt in 1 2; do
            npm ci
            if ./node_modules/.bin/claude --version; then
              exit 0
            fi
            echo "::warning::claude native binary missing after npm ci (attempt ${attempt}): the platform optionalDependency was silently skipped; retrying with a clean cache"
            rm -rf node_modules
            npm cache clean --force
          done
          echo "::error::claude native binary still missing after 2 install attempts; running the postinstall manually to surface the real error"
          npm ci
          node ./node_modules/@anthropic-ai/claude-code/install.cjs
          exit 1
      - name: Validate shuck plugin manifest
        run: ./.github/plugin-validate/node_modules/.bin/claude plugin validate --strict ./plugins/shuck
      - name: Validate shuck-channel plugin manifest
        run: ./.github/plugin-validate/node_modules/.bin/claude plugin validate --strict ./plugins/shuck-channel
      - name: Validate marketplace manifest
        run: ./.github/plugin-validate/node_modules/.bin/claude plugin validate --strict .claude-plugin/marketplace.json
      # The repo bakes the plugin's skill in for project-level use
      # (.claude/skills/shuck) and mirrors its MCP config (.mcp.json); the
      # plugin copies are the source of truth. Fail when they drift.
      - name: Check baked-in skill and MCP config match the plugin
        run: |
          diff -u plugins/shuck/skills/shuck/SKILL.md .claude/skills/shuck/SKILL.md
          diff -u plugins/shuck/.mcp.json .mcp.json

  terraform:
    name: Terraform (deploy module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.13.5"
      # Mirrors `make terraform-check`: fmt + validate only — plan/apply
      # need AWS credentials and stay a manual operator step.
      - name: Format check
        run: terraform -chdir=deploy/terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform -chdir=deploy/terraform init -backend=false -input=false
      - name: Validate
        run: terraform -chdir=deploy/terraform validate

  helm:
    name: Helm (deploy chart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Mirrors `make helm-check` using the runner's helm (the shellcheck
      # precedent): lint, then render the default posture and the one
      # non-default combo. Install/upgrade runs in the kind smoke job.
      - name: Lint
        run: helm lint deploy/helm/shuck
      - name: Template (default posture)
        run: >-
          helm template shuck deploy/helm/shuck --kube-version 1.33.0
          -f deploy/helm/shuck/ci/smoke-values.yaml > /dev/null
      - name: Template (non-default combo)
        run: >-
          helm template shuck deploy/helm/shuck --kube-version 1.33.0
          -f deploy/helm/shuck/ci/smoke-values.yaml
          -f deploy/helm/shuck/ci/combo-values.yaml > /dev/null

  helm-smoke:
    name: Helm smoke (kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      # Exact-version go install is checksum-verified by the Go module
      # sumdb (the actionlint precedent).
      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.32.0
      - name: Create cluster
        run: kind create cluster --name shuck-smoke --wait 120s
      - name: Build backend images
        run: |
          for c in ingest worker gateway portal; do
            docker build -f Dockerfile.backend --build-arg COMPONENT="$c" \
              -t "ghcr.io/justanotherspy/shuck-$c:smoke" .
          done
      - name: Load images into kind
        run: |
          kind load docker-image --name shuck-smoke \
            ghcr.io/justanotherspy/shuck-ingest:smoke \
            ghcr.io/justanotherspy/shuck-worker:smoke \
            ghcr.io/justanotherspy/shuck-gateway:smoke \
            ghcr.io/justanotherspy/shuck-portal:smoke
      # Defaults posture: in-cluster ingest, static worker, no NP. The
      # ingest rollout implicitly proves the deploy-order gate resolves
      # (its initContainer waits on the worker Deployment).
      - name: Install (default posture)
        run: |
          helm install shuck deploy/helm/shuck -f deploy/helm/shuck/ci/smoke-values.yaml
          kubectl rollout status deployment/shuck-worker --timeout=180s
          kubectl rollout status deployment/shuck-gateway --timeout=180s
          kubectl rollout status deployment/shuck-portal --timeout=180s
          kubectl rollout status deployment/shuck-ingest --timeout=300s
          kubectl get cronjob shuck-portal-sweep
      # The one deliberately non-default combo the ticket calls for:
      # lambda ingest + HPA + NetworkPolicy on.
      - name: Upgrade (lambda ingest + HPA + NetworkPolicy)
        run: |
          helm upgrade shuck deploy/helm/shuck \
            -f deploy/helm/shuck/ci/smoke-values.yaml \
            -f deploy/helm/shuck/ci/combo-values.yaml
          kubectl rollout status deployment/shuck-worker --timeout=180s
          kubectl wait --for=delete deployment/shuck-ingest --timeout=120s || \
            ! kubectl get deployment/shuck-ingest
          kubectl get hpa shuck-worker
          kubectl get networkpolicy shuck-gateway shuck-worker shuck-portal
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide || true
          kubectl describe pods || true
          kubectl logs -l app.kubernetes.io/instance=shuck --all-containers --tail=100 || true

  shim:
    name: Channel shim (Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/shuck-channel
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      # --frozen-lockfile installs exactly the committed bun.lock (exact-pinned
      # deps) and fails on any drift.
      - name: Install dependencies (locked)
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
