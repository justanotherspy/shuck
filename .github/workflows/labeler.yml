name: Labels

# Keeps the repository's labels in sync with .github/labels.yml so the labels
# referenced by dependabot.yml and release-drafter.yml always exist.
on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
      - .github/workflows/labeler.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Sync repository labels
        uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6.0.0
        with:
          yaml-file: .github/labels.yml
          # Only create/update the labels we declare; never delete others.
          skip-delete: true
