name: Zizmor

# Static analysis of the GitHub Actions workflows themselves: template
# injection, excessive permissions, unpinned/known-vulnerable actions,
# cache poisoning, credential persistence, etc.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Actions audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      # Hash-pinned install (supply-chain integrity); the requirements file is
      # regenerated by Dependabot's pip ecosystem.
      - name: Install zizmor
        run: python -m pip install --require-hashes -r .github/requirements/zizmor.txt
      - name: Audit workflows (SARIF)
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor --format sarif .github/workflows > zizmor.sarif
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: zizmor.sarif
          category: zizmor
      - name: Fail on high-severity findings
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor --min-severity=high .github/workflows
