name: Zizmor

# Static analysis of the GitHub Actions workflows themselves: template
# injection, excessive permissions, unpinned/known-vulnerable actions,
# cache poisoning, credential persistence, etc.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Actions audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      # Hash-pinned install (supply-chain integrity); the requirements file is
      # regenerated by Dependabot's pip ecosystem.
      - name: Install zizmor
        run: python -m pip install --require-hashes -r .github/requirements/zizmor.txt
      - name: Audit workflows (SARIF)
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor --format sarif .github/workflows > zizmor.sarif
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: zizmor.sarif
          category: zizmor
      - name: Fail on high-severity findings
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor --min-severity=high .github/workflows
