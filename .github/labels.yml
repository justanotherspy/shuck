# Canonical repository labels, synced by .github/workflows/labeler.yml.
# These are referenced by .github/dependabot.yml and .github/release-drafter.yml;
# keep this file in sync when you add a new label reference there.

# --- Dependabot ---
- name: dependencies
  color: 0366d6
  description: Dependency updates
- name: go
  color: 00add8
  description: Go modules / language
- name: github-actions
  color: 2088ff
  description: GitHub Actions / CI workflows
- name: docker
  color: 2496ed
  description: Docker / container images
- name: plugin
  color: 8250df
  description: Claude Code plugins (plugins/*)

# --- release-drafter categories ---
- name: feature
  color: 0e8a16
  description: New feature
- name: enhancement
  color: a2eeef
  description: New feature or request
- name: fix
  color: d93f0b
  description: Bug fix
- name: bug
  color: d73a4a
  description: Something isn't working
- name: chore
  color: fef2c0
  description: Routine task or chore
- name: refactor
  color: fbca04
  description: Code refactoring
- name: docs
  color: 0075ca
  description: Documentation
- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation

# --- release-drafter version resolver ---
- name: major
  color: b60205
  description: Breaking change (major version bump)
- name: minor
  color: 5319e7
  description: Backwards-compatible feature (minor version bump)
- name: patch
  color: c5def5
  description: Backwards-compatible fix (patch version bump)
