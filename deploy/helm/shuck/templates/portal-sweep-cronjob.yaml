{{- /*
Daily token re-validation: `shuck-portal sweep` runs one pass and exits,
revoking tokens of departed org members (GitHub org membership is the
access-control plane — offboarding included; JUS-90). A validation error
skips the token — never a revoke.
*/ -}}
{{- if .Values.portal.sweep.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "shuck.fullname" . }}-portal-sweep
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal
spec:
  schedule: {{ .Values.portal.sweep.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "shuck.selectorLabels" (dict "root" . "component" "portal-sweep") | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "shuck.serviceAccountName" (dict "root" . "component" "portal") }}
          {{- with .Values.image.pullSecrets }}
          imagePullSecrets:
            {{- range . }}
            - name: {{ . }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- include "shuck.podSecurityContext" . | nindent 12 }}
          containers:
            - name: sweep
              image: {{ include "shuck.image" (dict "root" . "component" "portal") }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args: ["sweep"]
              securityContext:
                {{- include "shuck.containerSecurityContext" . | nindent 16 }}
              env:
                - name: SHUCK_TOKEN_TABLE
                  value: {{ .Values.config.tokenTable | quote }}
                {{- include "shuck.portalValidationEnv" . | nindent 16 }}
                {{- include "shuck.ghesEnv" . | nindent 16 }}
                {{- include "shuck.awsEnv" . | nindent 16 }}
              {{- with .Values.portal.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
                {{- include "shuck.appKeyVolumeMount" . | nindent 16 }}
          volumes:
            {{- include "shuck.appKeyVolume" . | nindent 12 }}
{{- end }}
