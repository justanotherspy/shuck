{{- /*
Prometheus Operator PodMonitor (JUS-96, opt-in). Scrapes the `metrics`
container port of every chart pod, including the worker (which has no Service
and so cannot be covered by the ServiceMonitor). Requires the
monitoring.coreos.com CRDs in the cluster.
*/ -}}
{{- if and .Values.observability.enabled .Values.observability.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "shuck.fullname" . }}
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
    {{- with .Values.observability.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "shuck.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  podMetricsEndpoints:
    - port: metrics
      path: {{ .Values.observability.path }}
      {{- with .Values.observability.podMonitor.interval }}
      interval: {{ . }}
      {{- end }}
      {{- with .Values.observability.podMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
      {{- with .Values.observability.podMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.observability.podMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
