{{- /*
The event worker (JUS-87/91): SQS poll loop → App installation token →
fetch → distil → deliver to the gateway. Scaling is mode-selected
(static / hpa / keda); replicas only render in static mode so HPA/KEDA
own the count otherwise.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shuck.fullname" . }}-worker
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if eq .Values.worker.scaling.mode "static" }}
  replicas: {{ .Values.worker.scaling.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "shuck.selectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shuck.selectorLabels" (dict "root" . "component" "worker") | nindent 8 }}
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "shuck.serviceAccountName" (dict "root" . "component" "worker") }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      securityContext:
        {{- include "shuck.podSecurityContext" . | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "shuck.image" (dict "root" . "component" "worker") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "shuck.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SHUCK_GITHUB_APP_ID
              value: {{ .Values.github.appId | quote }}
            - name: SHUCK_GITHUB_APP_PRIVATE_KEY_FILE
              value: /etc/shuck/github-app-private-key.pem
            - name: SHUCK_QUEUE_URL
              value: {{ .Values.config.queueUrl | quote }}
            - name: SHUCK_DELIVER_URL
              value: {{ include "shuck.deliverURL" . | quote }}
            - name: SHUCK_DELIVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "shuck.secretName" . }}
                  key: deliver-secret
            {{- with .Values.config.rawLogBucket }}
            - name: SHUCK_RAW_LOG_BUCKET
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.worker.summaryLimit }}
            - name: SHUCK_SUMMARY_LIMIT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.worker.ignoreAuthors }}
            - name: SHUCK_IGNORE_AUTHORS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.worker.reviewContextLines }}
            - name: SHUCK_REVIEW_CONTEXT_LINES
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.github.apiUrl }}
            - name: SHUCK_GITHUB_API_URL
              value: {{ . | quote }}
            {{- end }}
            {{- include "shuck.awsEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- include "shuck.appKeyVolumeMount" . | nindent 12 }}
      volumes:
        {{- include "shuck.appKeyVolume" . | nindent 8 }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
