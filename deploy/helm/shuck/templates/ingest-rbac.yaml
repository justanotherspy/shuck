{{- /*
Minimal RBAC for the deploy-order gate: the wait-for-worker initContainer
only needs to watch the worker Deployment's rollout status in the release
namespace.
*/ -}}
{{- if and (eq .Values.ingest.mode "in-cluster") .Values.deployOrder.enforce }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "shuck.fullname" . }}-ingest-wait
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "shuck.fullname" . }}-ingest-wait
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "shuck.fullname" . }}-ingest-wait
subjects:
  - kind: ServiceAccount
    name: {{ include "shuck.serviceAccountName" (dict "root" . "component" "ingest") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
