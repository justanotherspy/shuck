{{- /*
The chart-rendered Secret (dev/demo convenience). Production installs should
prefer secrets.existingSecret or externalSecrets.enabled — both produce the
same keys, so the workloads never care where the Secret came from.
*/ -}}
{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) (not .Values.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shuck.fullname" . }}
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
type: Opaque
data:
  webhook-secret: {{ .Values.secrets.values.webhookSecret | b64enc | quote }}
  deliver-secret: {{ .Values.secrets.values.deliverSecret | b64enc | quote }}
  {{- with .Values.secrets.values.deliverSecretSecondary }}
  deliver-secret-secondary: {{ . | b64enc | quote }}
  {{- end }}
  session-secret: {{ .Values.secrets.values.sessionSecret | b64enc | quote }}
  github-client-secret: {{ .Values.secrets.values.githubClientSecret | b64enc | quote }}
  {{- with .Values.secrets.values.oidcClientSecret }}
  oidc-client-secret: {{ . | b64enc | quote }}
  {{- end }}
  github-app-private-key.pem: {{ .Values.secrets.values.githubAppPrivateKey | b64enc | quote }}
{{- end }}
