{{- /*
One ServiceAccount per component so IRSA roles stay least-privilege (the
deploy/terraform module's per-function IAM policies are the reference).
Only the ingest SA mounts an API token, and only for the deploy-order
initContainer.
*/ -}}
{{- range $component := list "gateway" "portal" "worker" "ingest" }}
{{- $sa := index $.Values.serviceAccounts $component }}
{{- $skip := or
  (and (eq $component "portal") (not (or $.Values.portal.enabled $.Values.portal.sweep.enabled)))
  (and (eq $component "ingest") (ne $.Values.ingest.mode "in-cluster")) }}
{{- if and $sa.create (not $skip) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "shuck.serviceAccountName" (dict "root" $ "component" $component) }}
  labels:
    {{- include "shuck.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  {{- with $sa.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ and (eq $component "ingest") $.Values.deployOrder.enforce }}
{{- end }}
{{- end }}
