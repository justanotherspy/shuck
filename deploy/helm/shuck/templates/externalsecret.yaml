{{- /*
ExternalSecret producing the chart's Secret via the External Secrets
Operator (assumed installed — the chart never installs controllers).
Entries with an empty remoteRef key are skipped, so optional secrets
(secondary deliver secret, OIDC) only sync when configured.
*/ -}}
{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "shuck.fullname" . }}
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled" .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "shuck.secretName" . }}
    creationPolicy: Owner
  data:
    {{- $entries := list
      (list "webhook-secret" .Values.externalSecrets.data.webhookSecret)
      (list "deliver-secret" .Values.externalSecrets.data.deliverSecret)
      (list "session-secret" .Values.externalSecrets.data.sessionSecret)
      (list "github-client-secret" .Values.externalSecrets.data.githubClientSecret)
      (list "oidc-client-secret" .Values.externalSecrets.data.oidcClientSecret)
      (list "github-app-private-key.pem" .Values.externalSecrets.data.githubAppPrivateKey) }}
    {{- range $entry := $entries }}
    {{- $name := index $entry 0 }}
    {{- $ref := index $entry 1 }}
    {{- if and $ref $ref.key }}
    - secretKey: {{ $name }}
      remoteRef:
        key: {{ $ref.key }}
        {{- with $ref.property }}
        property: {{ . }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
