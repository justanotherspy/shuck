{{- /*
KEDA ScaledObject on SQS depth, scale-to-zero capable. KEDA itself is
assumed installed (the chart never installs controllers). With
identityOwner=operator, the KEDA operator's own AWS identity polls the
queue; with pod, the worker service account's IRSA role is used. Extra
TriggerAuthentication wiring belongs in extraManifests.
*/ -}}
{{- if eq .Values.worker.scaling.mode "keda" }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "shuck.fullname" . }}-worker
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    name: {{ include "shuck.fullname" . }}-worker
  minReplicaCount: {{ .Values.worker.scaling.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.worker.scaling.keda.maxReplicaCount }}
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: {{ .Values.config.queueUrl | quote }}
        queueLength: {{ .Values.worker.scaling.keda.queueLength | quote }}
        awsRegion: {{ .Values.aws.region | quote }}
        identityOwner: {{ .Values.worker.scaling.keda.identityOwner | quote }}
{{- end }}
