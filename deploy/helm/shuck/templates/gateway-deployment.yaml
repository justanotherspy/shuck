{{- /*
The resident gateway (JUS-88): WebSocket termination, /internal/deliver,
in-process grace-window sweeper. Single replica until JUS-95 — the live
connection registry is in-memory. Rollouts rely on the SIGTERM drain: the
readiness probe flips 503, the preStop sleep lets endpoint removal
propagate, then every socket closes with 1001 so shims reconnect and the
buffered replay hides the gap.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shuck.fullname" . }}-gateway
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "shuck.selectorLabels" (dict "root" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shuck.selectorLabels" (dict "root" . "component" "gateway") | nindent 8 }}
      {{- with .Values.gateway.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "shuck.serviceAccountName" (dict "root" . "component" "gateway") }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      securityContext:
        {{- include "shuck.podSecurityContext" . | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.gateway.terminationGracePeriodSeconds }}
      containers:
        - name: gateway
          image: {{ include "shuck.image" (dict "root" . "component" "gateway") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "shuck.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
            {{- include "shuck.metricsPort" . | nindent 12 }}
          env:
            - name: SHUCK_TOKEN_TABLE
              value: {{ .Values.config.tokenTable | quote }}
            - name: SHUCK_SUBSCRIPTION_TABLE
              value: {{ .Values.config.subscriptionTable | quote }}
            - name: SHUCK_BUFFER_TABLE
              value: {{ .Values.config.bufferTable | quote }}
            - name: SHUCK_DELIVER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "shuck.secretName" . }}
                  key: deliver-secret
            - name: SHUCK_DELIVER_SECRET_SECONDARY
              valueFrom:
                secretKeyRef:
                  name: {{ include "shuck.secretName" . }}
                  key: deliver-secret-secondary
                  optional: true
            {{- with .Values.gateway.heartbeat }}
            - name: SHUCK_HEARTBEAT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.graceWindow }}
            - name: SHUCK_GRACE_WINDOW
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.sweepInterval }}
            - name: SHUCK_SWEEP_INTERVAL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.gateway.bufferTTL }}
            - name: SHUCK_BUFFER_TTL
              value: {{ . | quote }}
            {{- end }}
            {{- include "shuck.awsEnv" . | nindent 12 }}
            {{- include "shuck.metricsEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          {{- if gt (int .Values.gateway.preStopSleepSeconds) 0 }}
          lifecycle:
            preStop:
              sleep:
                seconds: {{ .Values.gateway.preStopSleepSeconds }}
          {{- end }}
          {{- with .Values.gateway.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
