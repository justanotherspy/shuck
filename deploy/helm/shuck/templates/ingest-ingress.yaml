{{- /*
The DEDICATED public /webhook Ingress — its own class/annotations so WAF /
rate limits attach to the public route independently of the private
gateway/portal ingress. Scoped to exactly /webhook: nothing else on this
host routes anywhere.
*/ -}}
{{- if and (eq .Values.ingest.mode "in-cluster") .Values.ingest.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "shuck.fullname" . }}-ingest
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
  {{- with .Values.ingest.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingest.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingest.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ required "ingest.ingress.host is required when ingest.ingress.enabled (or set ingest.ingress.enabled=false and expose the Service yourself)" .Values.ingest.ingress.host | quote }}
      http:
        paths:
          - path: /webhook
            pathType: Exact
            backend:
              service:
                name: {{ include "shuck.fullname" . }}-ingest
                port:
                  name: http
{{- end }}
