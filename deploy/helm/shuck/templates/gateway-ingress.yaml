{{- /*
Private ingress for the shim WebSocket endpoint. Deliberately scoped to
/ws only — /internal/deliver stays cluster-internal (the shared secret
guards it either way; not routing it is defence in depth). Keep this on an
internal LB / VPN-routable ingress class, and see the README's WS
annotation notes (heartbeat vs proxy read timeouts).
*/ -}}
{{- if .Values.gateway.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "shuck.fullname" . }}-gateway
  labels:
    {{- include "shuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.gateway.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.gateway.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.gateway.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ required "gateway.ingress.host is required when gateway.ingress.enabled" .Values.gateway.ingress.host | quote }}
      http:
        paths:
          - path: /ws
            pathType: Exact
            backend:
              service:
                name: {{ include "shuck.fullname" . }}-gateway
                port:
                  name: http
{{- end }}
