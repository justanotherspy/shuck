# The ONE deliberately non-default combo the ticket calls for: lambda
# ingest (no public cluster surface) + HPA worker scaling + NetworkPolicy
# on. Layered on top of smoke-values.yaml in the kind smoke test (kind's
# default CNI does not enforce NetworkPolicy — the assertion is that the
# objects render, apply, and the workloads stay healthy).
ingest:
  mode: lambda

worker:
  scaling:
    mode: hpa
    hpa:
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 75

networkPolicy:
  enabled: true
  gatewayExtraFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
  portalFrom:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx

# Core metrics wiring: the metrics port on every component + Service, and the
# NetworkPolicy allowance for it. ServiceMonitor/PodMonitor stay off — kind
# has no Prometheus Operator CRDs, so those objects can't apply here (they are
# render-checked separately in `make helm-check`).
observability:
  enabled: true
