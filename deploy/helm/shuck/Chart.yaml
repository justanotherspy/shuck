apiVersion: v2
name: shuck
description: >-
  The shuck self-hosted event router (v2 backend): GitHub App webhook ingest,
  SQS-fed workers, the resident WebSocket gateway, and the token portal.
  Strictly opt-in — the portable shuck CLI / MCP server works without any of
  this. See https://github.com/justanotherspy/shuck/blob/main/docs/V2.md.
type: application
# Chart version; release.yml overrides both at package time so published
# charts track the git tag (--version/--app-version).
version: 0.1.0
# Default image tag for the backend images (image.tag overrides). "edge"
# tracks main; published charts pin the release semver instead.
appVersion: edge
# 1.30 floor: the gateway preStop uses the `sleep` lifecycle action
# (beta + on-by-default in 1.30, GA 1.32).
kubeVersion: ">=1.30.0-0"
home: https://github.com/justanotherspy/shuck
sources:
  - https://github.com/justanotherspy/shuck
keywords:
  - github
  - ci
  - claude-code
  - webhooks
maintainers:
  - name: justanotherspy
    url: https://github.com/justanotherspy
